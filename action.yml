name: "AetherPak Setup CLI"
description: "Download AetherPak CLI binary and install dependencies on Linux."
branding:
  icon: "terminal"
  color: "blue"
inputs:
  version:
    description: "Version of AetherPak CLI to install (e.g., v0.2.0, latest)"
    required: false
    default: "latest"
  repo:
    description: "GitHub repository for AetherPak CLI releases"
    required: false
    default: "aetherpak/cli"
  install-dependencies:
    description: "Trigger installation of missing host dependencies (flatpak, ostree, gpg, flatpak-builder)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Verify OS compatibility
      shell: bash
      run: |
        if [ "$RUNNER_OS" != "Linux" ]; then
          echo "::error::AetherPak Setup CLI action only supports Linux runners."
          exit 1
        fi

    - name: Ensure tooling
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        MISSING=""
        command -v flatpak >/dev/null 2>&1 || MISSING="$MISSING flatpak"
        command -v ostree  >/dev/null 2>&1 || MISSING="$MISSING ostree"
        command -v gpg     >/dev/null 2>&1 || MISSING="$MISSING gnupg"
        command -v flatpak-builder >/dev/null 2>&1 || MISSING="$MISSING flatpak-builder"
        if [ -n "$MISSING" ] && command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update && sudo apt-get install -y $MISSING
        fi

    - name: Download AetherPak CLI
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # 1. Map Arch
        case "$(echo "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')" in
          x64|amd64) ARCH="amd64" ;;
          arm64) ARCH="arm64" ;;
          *)
            echo "::error::Unsupported CPU architecture: $RUNNER_ARCH. Only x86_64/amd64 and arm64 are supported."
            exit 1
            ;;
        esac

        OS="linux"
        EXT="tar.gz"

        # 2. Resolve version tag
        TAG="${{ inputs.version }}"
        if [ "$TAG" = "latest" ]; then
          # First try gh release view
          if command -v gh >/dev/null 2>&1; then
            TAG=$(gh release view --repo "${{ inputs.repo }}" --json tagName -q .tagName || true)
          fi
          # Fallback to public GitHub API
          if [ -z "$TAG" ]; then
            AUTH_HEADER=""
            if [ -n "${GH_TOKEN:-}" ]; then
              AUTH_HEADER="-H \"Authorization: token $GH_TOKEN\""
            fi
            TAG=$(eval "curl -sSL $AUTH_HEADER https://api.github.com/repos/${{ inputs.repo }}/releases/latest" | jq -r '.tag_name // empty')
          fi
          # Fail if we still couldn't resolve the latest tag
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Could not resolve latest release tag for ${{ inputs.repo }}"
            exit 1
          fi
        fi

        echo "Resolved version tag: $TAG"

        # 3. Download release asset
        ARCHIVE_NAME="aetherpak-${OS}-${ARCH}.${EXT}"
        BINARY_INTERNAL="aetherpak-${OS}-${ARCH}"

        INSTALL_DIR="$RUNNER_TEMP/aetherpak-bin"
        mkdir -p "$INSTALL_DIR"

        DOWNLOAD_DIR="$(mktemp -d)"
        trap 'rm -rf "$DOWNLOAD_DIR"' EXIT

        echo "Downloading $ARCHIVE_NAME from ${{ inputs.repo }}@$TAG..."
        DOWNLOADED="false"
        if command -v gh >/dev/null 2>&1; then
          if gh release download "$TAG" --repo "${{ inputs.repo }}" --pattern "$ARCHIVE_NAME" --dir "$DOWNLOAD_DIR" 2>/dev/null; then
            DOWNLOADED="true"
          fi
        fi

        if [ "$DOWNLOADED" = "false" ]; then
          AUTH_HEADER=""
          if [ -n "${GH_TOKEN:-}" ]; then
            AUTH_HEADER="-H \"Authorization: token $GH_TOKEN\""
          fi
          URL="https://github.com/${{ inputs.repo }}/releases/download/${TAG}/${ARCHIVE_NAME}"
          eval "curl -fL $AUTH_HEADER -o \"$DOWNLOAD_DIR/$ARCHIVE_NAME\" \"$URL\""
        fi

        # 4. Extract archive
        tar -xzf "$DOWNLOAD_DIR/$ARCHIVE_NAME" -C "$INSTALL_DIR"

        # 5. Rename to simple binary name
        mv "$INSTALL_DIR/$BINARY_INTERNAL" "$INSTALL_DIR/aetherpak"
        chmod +x "$INSTALL_DIR/aetherpak"

        # 6. Add to PATH
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        echo "Successfully installed aetherpak $TAG to $INSTALL_DIR and added to GITHUB_PATH"
